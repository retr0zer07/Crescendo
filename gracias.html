<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#101d3b">
    <title>Thank You for Contacting Us! | Crescendo Digital Marketing</title>
    <meta name="description" content="We have received your request. We will contact you soon.">
    
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/styles.css?v=2026.04.29.1757">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">

    <style>
        .thank-you-section {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }
        
        .thank-you-content {
            max-width: 600px;
            animation: fadeInUp 0.6s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #F5B82A, #FFD700);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 3rem;
            color: #101d3b;
            animation: scaleIn 0.5s ease 0.2s backwards;
        }
        
        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }
        
        .thank-you-content h1 {
            font-size: 2.5rem;
            color: #101d3b;
            margin-bottom: 20px;
        }
        
        .thank-you-content p {
            font-size: 1.2rem;
            color: #666;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        
        .redirect-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin: 30px 0;
            font-size: 0.95rem;
            color: #666;
        }
        
        .redirect-info i {
            color: #F5B82A;
            margin-right: 10px;
        }
    </style>
<!-- TikTok Pixel (deferred) -->
<script>
(function (w, d) {
    var loaded = false;
    var ttq = w.ttq = w.ttq || [];
    ttq.methods = ["page", "track", "identify", "instances", "debug", "on", "off", "once", "ready", "alias", "group", "enableCookie", "disableCookie", "holdConsent", "revokeConsent", "grantConsent"];
    ttq.setAndDefer = function (obj, method) {
        obj[method] = function () {
            obj.push([method].concat([].slice.call(arguments, 0)));
        };
    };

    for (var i = 0; i < ttq.methods.length; i++) {
        ttq.setAndDefer(ttq, ttq.methods[i]);
    }

    function loadTikTok() {
        if (loaded) return;
        loaded = true;
        var s = d.createElement('script');
        s.async = true;
        s.src = 'https://analytics.tiktok.com/i18n/pixel/events.js?sdkid=D6RIACBC77UA8MCFBND0&lib=ttq';
        d.head.appendChild(s);
        ttq.page();
    }

    ['pointerdown', 'keydown', 'scroll', 'touchstart'].forEach(function (evt) {
        w.addEventListener(evt, loadTikTok, { once: true, passive: true });
    });

    w.addEventListener('load', function () {
        setTimeout(loadTikTok, 12000);
    }, { once: true });
})(window, document);
</script>
</head>
<body>
    <div id="header-placeholder"></div>

    <section class="thank-you-section">
        <div class="thank-you-content">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
            
            <h1>Message Sent!</h1>
            <p>Thank you for contacting us. We have received your audit request and will respond within 24 hours.</p>
            
            <div class="redirect-info">
                <i class="fas fa-info-circle"></i>
                <span>You will be redirected to home in <strong id="countdown">5</strong> seconds...</span>
            </div>
            
            <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                <a href="index.html" class="btn btn-lg btn-primary">Back to Home</a>
                <a href="https://wa.me/17867556238" target="_blank" rel="noopener" class="btn btn-lg btn-secondary">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </a>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="js/components.js?v=2026.04.29.1757" defer></script>
    <script src="js/script.js?v=2026.04.29.1757" defer></script>
    <script>
        // Countdown and redirect
        let seconds = 5;
        const countdownElement = document.getElementById('countdown');
        
        const interval = setInterval(() => {
            seconds--;
            countdownElement.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = 'index.html';
            }
        }, 1000);
    </script>
</body>
</html>
